<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinese Glosser</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, sans-serif;
            background-color: #1a1a2e;
            color: #e0e0e0;
            padding: 1rem;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #ffd43b;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .button-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        button {
            padding: 0.6rem 1.2rem;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover { transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        .btn-paste { background-color: #3B82F6; }
        .btn-paste:hover { background-color: #2563EB; }
        .btn-clear { background-color: #6B7280; }
        .btn-clear:hover { background-color: #4B5563; }
        .btn-gloss { background-color: #10B981; }
        .btn-gloss:hover { background-color: #059669; }
        .btn-copy { background-color: #8B5CF6; }
        .btn-copy:hover { background-color: #7C3AED; }
        .btn-cache { background-color: #F59E0B; color: #1a1a2e; }
        .btn-cache:hover { background-color: #D97706; }
        .btn-play { background-color: #EF4444; }
        .btn-play:hover { background-color: #DC2626; }
        .btn-stop { background-color: #6B7280; }
        .btn-stop:hover { background-color: #4B5563; }
        .btn-nav { background-color: #14B8A6; font-size: 0.8rem; }
        .btn-nav:hover { background-color: #0D9488; }

        .lang-toggle {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1rem;
            align-items: center;
            padding: 0.5rem 1rem;
            background: #16213e;
            border-radius: 6px;
        }

        .lang-toggle label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .lang-toggle input[type="radio"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            min-height: 100px;
            padding: 1rem;
            border: 2px solid #333;
            border-radius: 8px;
            background: #16213e;
            color: #e0e0e0;
            font-family: "Microsoft YaHei", "PingFang SC", inherit;
            font-size: 1.1rem;
            resize: vertical;
            margin-bottom: 1rem;
            outline: none;
        }

        textarea:focus { border-color: #3B82F6; }

        .status {
            text-align: center;
            padding: 0.5rem;
            background: #16213e;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: #9ca3af;
            min-height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gloss-area {
            background: #16213e;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 1.5rem;
            min-height: 200px;
            line-height: 1.4;
        }

        .gloss-line {
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem;
            margin-bottom: 1.2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #2a2a4a;
        }

        .gloss-line:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .gloss-word {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            padding: 0.4rem 0.5rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            min-width: 50px;
        }

        .gloss-word:hover {
            background-color: #2a2a4a;
        }

        .gloss-word.selected {
            background-color: #3B82F6;
        }

        .gloss-word.speaking {
            background-color: #EF4444;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
        }

        .gloss-chinese {
            font-size: 2rem;
            font-weight: 600;
            color: #ffd43b;
            margin-bottom: 0.15rem;
        }

        .gloss-pinyin {
            font-size: 0.8rem;
            color: #93C5FD;
            margin-bottom: 0.1rem;
        }

        .gloss-english {
            font-size: 0.7rem;
            color: #9ca3af;
            text-align: center;
            max-width: 90px;
            word-wrap: break-word;
            line-height: 1.3;
        }

        .gloss-word.punctuation {
            min-width: auto;
            padding: 0.3rem 0.1rem;
            cursor: default;
        }

        .gloss-word.punctuation:hover {
            background-color: transparent;
        }

        .gloss-word.punctuation .gloss-chinese {
            color: #6B7280;
        }

        .detail-panel {
            margin-top: 1rem;
            padding: 1rem;
            background: #0f3460;
            border-radius: 8px;
            display: none;
            border: 1px solid #3B82F6;
        }

        .detail-panel.visible { display: block; }

        .detail-word {
            font-size: 2rem;
            font-weight: 700;
            color: #ffd43b;
            margin-bottom: 0.3rem;
        }

        .detail-pinyin {
            font-size: 1.1rem;
            color: #93C5FD;
            margin-bottom: 0.3rem;
        }

        .detail-translation {
            font-size: 1rem;
            color: #e0e0e0;
            margin-bottom: 0.3rem;
        }

        .detail-extra {
            font-size: 0.9rem;
            color: #9ca3af;
            line-height: 1.6;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #4B5563;
            border-top: 2px solid #3B82F6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .cache-count {
            font-size: 0.75rem;
            color: #6B7280;
            margin-left: 0.5rem;
        }

        .placeholder {
            text-align: center;
            color: #4B5563;
            padding: 3rem 1rem;
            font-size: 1.1rem;
        }

        .font-size-btn {
            width: 32px;
            height: 32px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #e0e0e0;
            color: #333;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .font-size-btn:hover {
            background: #3B82F6;
            color: white;
        }

        @media (max-width: 600px) {
            body { padding: 0.5rem; }
            h1 { font-size: 1.2rem; }
            .button-group { gap: 0.3rem; }
            button { padding: 0.5rem 0.8rem; font-size: 0.8rem; }
            .gloss-area { padding: 0.8rem; }
            .gloss-line { gap: 0.15rem; }
            .gloss-word { min-width: 44px; padding: 0.4rem 0.3rem; }
            .gloss-chinese { font-size: 2.2rem; }
            .gloss-pinyin { font-size: 0.85rem; }
            .gloss-english { font-size: 0.7rem; max-width: 70px; }
            .detail-word { font-size: 2.5rem; }
            .detail-pinyin { font-size: 1.2rem; }
            .detail-translation { font-size: 1.1rem; }
            .lang-toggle { gap: 0.5rem; padding: 0.5rem 0.6rem; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chinese Glosser</h1>

        <div class="button-group">
            <button class="btn-paste" id="pasteBtn">Paste (Esc)</button>
            <button class="btn-gloss" id="glossBtn">Gloss</button>
            <button class="btn-copy" id="copyBtn">Copy Gloss</button>
            <button class="btn-clear" id="clearBtn">Clear</button>
            <button class="btn-play" id="playAllBtn">Play All</button>
            <button class="btn-stop" id="stopBtn">Stop</button>
            <button class="btn-cache" id="clearCacheBtn">Clear Cache <span class="cache-count" id="cacheCount"></span></button>
            <button class="btn-nav" onclick="location.href='/spanish-glosser'">Spanish</button>
            <button class="font-size-btn" id="fontDecrease" title="Decrease font size">-</button>
            <button class="font-size-btn" id="fontIncrease" title="Increase font size">+</button>
        </div>

        <div class="lang-toggle">
            <span>TTS Voice:</span>
            <label><input type="radio" name="ttsLang" value="zh-CN" checked> Mandarin</label>
            <label><input type="radio" name="ttsLang" value="zh-HK"> Cantonese</label>
        </div>

        <textarea id="inputArea" placeholder="Paste Chinese text here..."></textarea>

        <div class="status" id="status">Ready - paste Chinese text and click Gloss</div>

        <div class="gloss-area" id="glossArea">
            <div class="placeholder">Glossed text will appear here</div>
        </div>

        <div class="detail-panel" id="detailPanel">
            <div class="detail-word" id="detailWord"></div>
            <div class="detail-pinyin" id="detailPinyin"></div>
            <div class="detail-translation" id="detailTranslation"></div>
            <div class="detail-extra" id="detailExtra"></div>
        </div>
    </div>

    <script src="char_dict.js"></script>
    <script>
        // ============ DICTIONARY CACHE ============
        const CACHE_KEY = 'chinese_glosser_cache';

        function getCache() {
            try {
                return JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
            } catch { return {}; }
        }

        function setCache(cache) {
            localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
        }

        function getCachedWord(word) {
            const cache = getCache();
            return cache[word] || null;
        }

        function cacheWord(word, data) {
            const cache = getCache();
            cache[word] = data;
            setCache(cache);
        }

        function updateCacheCount() {
            const cache = getCache();
            const count = Object.keys(cache).length;
            document.getElementById('cacheCount').textContent = count > 0 ? `(${count})` : '';
        }

        // ============ LOOKUP ============
        // Looks up from bundled 3000-char dictionary first, falls back to API
        async function translateChar(char) {
            // Check bundled dictionary (char_dict.js)
            if (typeof CHAR_DICT !== 'undefined' && CHAR_DICT[char]) {
                const entry = CHAR_DICT[char];
                return {
                    translation: entry.d || '?',
                    pinyin: entry.p || '',
                    jyutping: entry.c || '',
                    traditional: entry.t || '',
                    radical: entry.r || '',
                    strokes: entry.s || '',
                    alternatives: [],
                    source: 'dict'
                };
            }

            // Check localStorage cache for API results
            const cached = getCachedWord(char);
            if (cached) return cached;

            // Fall back to MyMemory API
            try {
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(char)}&langpair=zh|en&de=stanley.tan19@gmail.com`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('API error');
                const data = await response.json();

                const mainTranslation = data.responseData?.translatedText || '';

                const alternatives = [];
                if (data.matches) {
                    for (const match of data.matches) {
                        const t = match.translation;
                        if (t && t.toLowerCase() !== mainTranslation.toLowerCase() && !alternatives.includes(t)) {
                            alternatives.push(t);
                            if (alternatives.length >= 3) break;
                        }
                    }
                }

                const result = {
                    translation: mainTranslation,
                    pinyin: '',
                    jyutping: '',
                    traditional: '',
                    radical: '',
                    strokes: '',
                    alternatives: alternatives,
                    source: 'api'
                };

                cacheWord(char, result);
                updateCacheCount();
                return result;
            } catch (err) {
                console.error(`Failed to translate "${char}":`, err);
                return { translation: '?', pinyin: '', jyutping: '', alternatives: [], source: 'none' };
            }
        }

        // ============ TEXT PROCESSING ============
        function isCJK(char) {
            const code = char.charCodeAt(0);
            return (code >= 0x4e00 && code <= 0x9fff) ||
                   (code >= 0x3400 && code <= 0x4dbf) ||
                   (code >= 0xf900 && code <= 0xfaff);
        }

        function isChinesePunct(char) {
            return /[，。！？；：、""''（）【】《》—…·\u3000-\u303f\uff00-\uffef]/.test(char);
        }

        function tokenize(text) {
            const lines = text.split('\n');
            const result = [];

            for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed) continue;

                const tokens = [];
                for (const char of trimmed) {
                    if (isCJK(char)) {
                        tokens.push({ type: 'char', text: char });
                    } else if (isChinesePunct(char) || /[.,!?;:'"()\-]/.test(char)) {
                        tokens.push({ type: 'punct', text: char });
                    } else if (char.trim()) {
                        // Non-CJK letter/number — group consecutive ones
                        if (tokens.length > 0 && tokens[tokens.length - 1].type === 'other') {
                            tokens[tokens.length - 1].text += char;
                        } else {
                            tokens.push({ type: 'other', text: char });
                        }
                    }
                }
                result.push(tokens);
            }

            return result;
        }

        // ============ GLOSSING ENGINE ============
        async function glossText() {
            const input = document.getElementById('inputArea').value.trim();
            if (!input) {
                setStatus('No text to gloss');
                return;
            }

            const glossArea = document.getElementById('glossArea');
            const lines = tokenize(input);

            // Collect unique characters
            const uniqueChars = new Set();
            for (const line of lines) {
                for (const token of line) {
                    if (token.type === 'char') {
                        uniqueChars.add(token.text);
                    }
                }
            }

            const charArray = [...uniqueChars];
            const total = charArray.length;
            let completed = 0;

            setStatus(`<span class="loading-spinner"></span> Glossing ${total} unique characters...`);

            const BATCH_SIZE = 5;
            const BATCH_DELAY = 300;
            const translations = {};

            for (let i = 0; i < charArray.length; i += BATCH_SIZE) {
                const batch = charArray.slice(i, i + BATCH_SIZE);
                const promises = batch.map(async (char) => {
                    const result = await translateChar(char);
                    translations[char] = result;
                    completed++;
                    setStatus(`<span class="loading-spinner"></span> Glossing... ${completed}/${total}`);
                });

                await Promise.all(promises);

                if (i + BATCH_SIZE < charArray.length) {
                    await new Promise(resolve => setTimeout(resolve, BATCH_DELAY));
                }
            }

            // Render glossed output
            glossArea.innerHTML = '';
            for (const line of lines) {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'gloss-line';

                for (const token of line) {
                    const wordDiv = document.createElement('div');

                    if (token.type === 'char') {
                        wordDiv.className = 'gloss-word';
                        const data = translations[token.text] || { translation: '?', pinyin: '', alternatives: [] };

                        let shortTranslation = data.translation || '?';
                        if (shortTranslation.length > 12) {
                            shortTranslation = shortTranslation.substring(0, 10) + '...';
                        }

                        // Show pinyin or jyutping based on toggle
                        const isCanto = getSelectedLang() === 'zh-HK';
                        const romanization = isCanto ? (data.jyutping || data.pinyin || '') : (data.pinyin || '');
                        const pinyinHtml = romanization ? `<span class="gloss-pinyin">${escapeHtml(romanization)}</span>` : '';

                        wordDiv.innerHTML = `
                            <span class="gloss-chinese">${escapeHtml(token.text)}</span>
                            ${pinyinHtml}
                            <span class="gloss-english">${escapeHtml(shortTranslation.toLowerCase())}</span>
                        `;

                        wordDiv.addEventListener('click', () => {
                            if (ttsPlaying) stopTTS();
                            document.querySelectorAll('.gloss-word.selected').forEach(el => el.classList.remove('selected'));
                            wordDiv.classList.add('selected');
                            showDetail(token.text, data);
                            speakWord(token.text);
                        });
                    } else if (token.type === 'punct') {
                        wordDiv.className = 'gloss-word punctuation';
                        wordDiv.innerHTML = `<span class="gloss-chinese">${escapeHtml(token.text)}</span>`;
                    } else {
                        wordDiv.className = 'gloss-word punctuation';
                        wordDiv.innerHTML = `<span class="gloss-chinese" style="font-size:0.9rem;color:#9ca3af;">${escapeHtml(token.text)}</span>`;
                    }

                    lineDiv.appendChild(wordDiv);
                }

                glossArea.appendChild(lineDiv);
            }

            setStatus(`Done - ${total} characters glossed`);
            updateCacheCount();
            applyFontSize();
        }

        function showDetail(char, data) {
            const panel = document.getElementById('detailPanel');
            document.getElementById('detailWord').textContent = char + (data.traditional && data.traditional !== char ? ` (${data.traditional})` : '');

            // Show both pinyin and jyutping if available
            let pinyinText = '';
            if (data.pinyin) pinyinText += `Pinyin: ${data.pinyin}`;
            if (data.jyutping) pinyinText += `${pinyinText ? '  |  ' : ''}Jyutping: ${data.jyutping}`;
            document.getElementById('detailPinyin').textContent = pinyinText;

            document.getElementById('detailTranslation').textContent = data.translation || 'No translation found';

            let extra = '';
            if (data.radical) extra += `Radical: ${data.radical}`;
            if (data.strokes) extra += `${extra ? '  |  ' : ''}Strokes: ${data.strokes}`;
            if (data.alternatives && data.alternatives.length > 0) {
                extra += `${extra ? '  |  ' : ''}Also: ${data.alternatives.join(', ')}`;
            }
            if (data.source) extra += `${extra ? '  |  ' : ''}Source: ${data.source === 'dict' ? 'Local (3000 chars)' : 'API'}`;
            document.getElementById('detailExtra').textContent = extra;

            panel.classList.add('visible');
        }

        // ============ TEXT-TO-SPEECH ============
        let ttsPlaying = false;
        let ttsWordElements = [];
        let ttsWordIndex = 0;

        function getSelectedLang() {
            return document.querySelector('input[name="ttsLang"]:checked')?.value || 'zh-CN';
        }

        function getChineseVoice() {
            const lang = getSelectedLang();
            const voices = speechSynthesis.getVoices();
            return voices.find(v => v.lang === lang && v.name.includes('Google'))
                || voices.find(v => v.lang === lang && (v.name.includes('Enhanced') || v.name.includes('Premium')))
                || voices.find(v => v.lang === lang)
                || voices.find(v => v.lang.startsWith(lang.substring(0, 2)))
                || null;
        }

        function speakWord(word) {
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = getSelectedLang();
            utterance.rate = 0.8;
            const voice = getChineseVoice();
            if (voice) utterance.voice = voice;
            speechSynthesis.speak(utterance);
        }

        function stopTTS() {
            speechSynthesis.cancel();
            ttsPlaying = false;
            ttsWordIndex = 0;
            document.querySelectorAll('.gloss-word.speaking').forEach(el => el.classList.remove('speaking'));
            setStatus('Stopped');
        }

        function playAllWords() {
            ttsWordElements = [...document.querySelectorAll('.gloss-word:not(.punctuation)')];
            if (ttsWordElements.length === 0) {
                setStatus('Nothing to play - gloss some text first');
                return;
            }

            stopTTS();
            ttsPlaying = true;
            ttsWordIndex = 0;
            speakNextWord();
        }

        function speakNextWord() {
            if (!ttsPlaying || ttsWordIndex >= ttsWordElements.length) {
                ttsPlaying = false;
                document.querySelectorAll('.gloss-word.speaking').forEach(el => el.classList.remove('speaking'));
                if (ttsWordIndex >= ttsWordElements.length) setStatus('Finished reading');
                return;
            }

            document.querySelectorAll('.gloss-word.speaking').forEach(el => el.classList.remove('speaking'));

            const el = ttsWordElements[ttsWordIndex];
            const chineseText = el.querySelector('.gloss-chinese')?.textContent || '';
            if (!chineseText) {
                ttsWordIndex++;
                speakNextWord();
                return;
            }

            el.classList.add('speaking');
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            setStatus(`Playing ${ttsWordIndex + 1}/${ttsWordElements.length}: ${chineseText}`);

            const utterance = new SpeechSynthesisUtterance(chineseText);
            utterance.lang = getSelectedLang();
            utterance.rate = 0.8;
            const voice = getChineseVoice();
            if (voice) utterance.voice = voice;

            utterance.onend = () => {
                ttsWordIndex++;
                if (ttsPlaying) {
                    setTimeout(() => speakNextWord(), 200);
                }
            };

            utterance.onerror = () => {
                ttsWordIndex++;
                if (ttsPlaying) speakNextWord();
            };

            speechSynthesis.cancel();
            setTimeout(() => {
                if (ttsPlaying) speechSynthesis.speak(utterance);
            }, 50);
        }

        // ============ FONT SIZE ============
        const FONT_KEY = 'chinese_glosser_fontsize';
        let glossFontSize = parseInt(localStorage.getItem(FONT_KEY)) || 32;

        function applyFontSize() {
            document.querySelectorAll('.gloss-chinese').forEach(el => {
                el.style.fontSize = glossFontSize + 'px';
            });
            document.querySelectorAll('.gloss-pinyin').forEach(el => {
                el.style.fontSize = Math.max(10, glossFontSize * 0.4) + 'px';
            });
            document.querySelectorAll('.gloss-english').forEach(el => {
                el.style.fontSize = Math.max(9, glossFontSize * 0.35) + 'px';
            });
        }

        function changeFontSize(delta) {
            glossFontSize += delta;
            if (glossFontSize < 16) glossFontSize = 16;
            if (glossFontSize > 64) glossFontSize = 64;
            localStorage.setItem(FONT_KEY, glossFontSize);
            applyFontSize();

            const btn = delta > 0 ? document.getElementById('fontIncrease') : document.getElementById('fontDecrease');
            btn.style.background = '#10B981';
            setTimeout(() => { btn.style.background = '#e0e0e0'; }, 200);
        }

        // ============ COPY GLOSS ============
        function copyGloss() {
            const glossArea = document.getElementById('glossArea');
            const lines = glossArea.querySelectorAll('.gloss-line');
            if (lines.length === 0) {
                setStatus('Nothing to copy');
                return;
            }

            const output = [];
            for (const line of lines) {
                const words = line.querySelectorAll('.gloss-word:not(.punctuation)');
                const chineseLine = [];
                const englishLine = [];

                for (const wordEl of words) {
                    const ch = wordEl.querySelector('.gloss-chinese')?.textContent || '';
                    const en = wordEl.querySelector('.gloss-english')?.textContent || '';
                    chineseLine.push(ch);
                    englishLine.push(en);
                }

                if (chineseLine.length > 0) {
                    output.push(chineseLine.join(''));
                    output.push(englishLine.join(' | '));
                    output.push('');
                }
            }

            const text = output.join('\n');
            navigator.clipboard.writeText(text).then(() => {
                setStatus('Gloss copied to clipboard');
            }).catch(() => {
                setStatus('Failed to copy');
            });
        }

        // ============ UTILITIES ============
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setStatus(msg) {
            document.getElementById('status').innerHTML = msg;
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('inputArea').value = text;
                setStatus('Text pasted - click Gloss to translate');
            } catch (err) {
                setStatus('Failed to read clipboard - try Ctrl+V into the text area');
            }
        }

        // ============ EVENT LISTENERS ============
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('pasteBtn').addEventListener('click', async () => {
                await pasteFromClipboard();
                await glossText();
            });

            document.getElementById('glossBtn').addEventListener('click', glossText);
            document.getElementById('copyBtn').addEventListener('click', copyGloss);

            document.getElementById('clearBtn').addEventListener('click', () => {
                document.getElementById('inputArea').value = '';
                document.getElementById('glossArea').innerHTML = '<div class="placeholder">Glossed text will appear here</div>';
                document.getElementById('detailPanel').classList.remove('visible');
                setStatus('Cleared');
            });

            document.getElementById('playAllBtn').addEventListener('click', playAllWords);
            document.getElementById('stopBtn').addEventListener('click', stopTTS);

            // Font size buttons
            document.getElementById('fontIncrease').addEventListener('click', () => changeFontSize(2));
            document.getElementById('fontDecrease').addEventListener('click', () => changeFontSize(-2));

            speechSynthesis.addEventListener('voiceschanged', () => speechSynthesis.getVoices());

            document.getElementById('clearCacheBtn').addEventListener('click', () => {
                const cache = getCache();
                const count = Object.keys(cache).length;
                localStorage.removeItem(CACHE_KEY);
                updateCacheCount();
                setStatus(`Cache cleared (${count} characters removed)`);
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    e.preventDefault();
                    pasteFromClipboard().then(() => glossText());
                }
            });

            updateCacheCount();
        });
    </script>
</body>
</html>
