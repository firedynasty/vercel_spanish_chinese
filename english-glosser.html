<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Glosser</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #1a1a2e;
            color: #e0e0e0;
            padding: 1rem;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #60a5fa;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .button-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        button {
            padding: 0.6rem 1.2rem;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover { transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        .btn-paste { background-color: #3B82F6; }
        .btn-paste:hover { background-color: #2563EB; }
        .btn-clear { background-color: #6B7280; }
        .btn-clear:hover { background-color: #4B5563; }
        .btn-gloss { background-color: #10B981; }
        .btn-gloss:hover { background-color: #059669; }
        .btn-cache { background-color: #F59E0B; color: #1a1a2e; }
        .btn-cache:hover { background-color: #D97706; }
        .btn-play { background-color: #EF4444; }
        .btn-play:hover { background-color: #DC2626; }
        .btn-stop { background-color: #6B7280; }
        .btn-stop:hover { background-color: #4B5563; }

        textarea {
            width: 100%;
            min-height: 100px;
            padding: 1rem;
            border: 2px solid #333;
            border-radius: 8px;
            background: #16213e;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            margin-bottom: 1rem;
            outline: none;
        }

        textarea:focus { border-color: #3B82F6; }

        .status {
            text-align: center;
            padding: 0.5rem;
            background: #16213e;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: #9ca3af;
            min-height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gloss-area {
            background: #16213e;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 1.5rem;
            min-height: 200px;
            line-height: 1.4;
        }

        .gloss-line {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin-bottom: 1.2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #2a2a4a;
        }

        .gloss-line:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .gloss-word {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            padding: 0.3rem 0.5rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            min-width: 40px;
        }

        .gloss-word:hover {
            background-color: #2a2a4a;
        }

        .gloss-word.selected {
            background-color: #3B82F6;
        }

        .gloss-word.speaking {
            background-color: #EF4444;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
        }

        .gloss-english {
            font-size: 1.2rem;
            font-weight: 600;
            color: #60a5fa;
            margin-bottom: 0.2rem;
        }

        .gloss-chinese {
            font-size: 0.85rem;
            color: #fbbf24;
            text-align: center;
            max-width: 120px;
            word-wrap: break-word;
        }

        .gloss-word.punctuation {
            min-width: auto;
            padding: 0.3rem 0.1rem;
            cursor: default;
        }

        .gloss-word.punctuation:hover {
            background-color: transparent;
        }

        .gloss-word.punctuation .gloss-english {
            color: #6B7280;
        }

        .detail-panel {
            margin-top: 1rem;
            padding: 1rem;
            background: #0f3460;
            border-radius: 8px;
            display: none;
            border: 1px solid #3B82F6;
        }

        .detail-panel.visible { display: block; }

        .detail-word {
            font-size: 1.5rem;
            font-weight: 700;
            color: #60a5fa;
            margin-bottom: 0.5rem;
        }

        .detail-translation {
            font-size: 1.3rem;
            color: #fbbf24;
            margin-bottom: 0.5rem;
        }

        .detail-extra {
            font-size: 0.9rem;
            color: #9ca3af;
            line-height: 1.6;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #4B5563;
            border-top: 2px solid #3B82F6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .cache-count {
            font-size: 0.75rem;
            color: #6B7280;
            margin-left: 0.5rem;
        }

        .placeholder {
            text-align: center;
            color: #4B5563;
            padding: 3rem 1rem;
            font-size: 1.1rem;
        }

        .font-size-btn {
            width: 32px;
            height: 32px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #e0e0e0;
            color: #333;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .font-size-btn:hover {
            background: #3B82F6;
            color: white;
        }

        @media (max-width: 600px) {
            body { padding: 0.5rem; }
            h1 { font-size: 1.2rem; }
            .button-group { gap: 0.3rem; }
            button { padding: 0.5rem 0.8rem; font-size: 0.8rem; }
            .gloss-area { padding: 1rem; }
            .gloss-english { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>English Glosser</h1>

        <div class="button-group">
            <button class="btn-paste" id="pasteBtn">Paste (Esc)</button>
            <button class="btn-gloss" id="glossBtn">Gloss</button>
            <button class="btn-clear" id="clearBtn">Clear</button>
            <button class="btn-play" id="playAllBtn">Play All</button>
            <button class="btn-stop" id="stopBtn">Stop</button>
            <button class="btn-cache" id="clearCacheBtn">Clear Cache <span class="cache-count" id="cacheCount"></span></button>
            <button style="background-color:#8B5CF6;font-size:0.8rem;" onclick="location.href='/reverse-english'">Reverse English</button>
            <button style="background-color:#F472B6;font-size:0.8rem;" onclick="location.href='/korean-glosser'">Korean</button>
            <button class="font-size-btn" id="fontDecrease" title="Decrease font size">-</button>
            <button class="font-size-btn" id="fontIncrease" title="Increase font size">+</button>
        </div>

        <textarea id="inputArea" placeholder="Paste English text here..."></textarea>

        <div class="status" id="status">Ready - paste English text and click Gloss</div>

        <div class="gloss-area" id="glossArea">
            <div class="placeholder">Glossed text will appear here</div>
        </div>

        <div class="detail-panel" id="detailPanel">
            <div class="detail-word" id="detailWord"></div>
            <div class="detail-translation" id="detailTranslation"></div>
            <div class="detail-extra" id="detailExtra"></div>
        </div>

    </div>

    <script>
        // ============ DICTIONARY CACHE ============
        const CACHE_KEY = 'english_glosser_cache';

        function getCache() {
            try {
                return JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
            } catch { return {}; }
        }

        function setCache(cache) {
            localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
        }

        function getCachedWord(word) {
            const cache = getCache();
            return cache[word.toLowerCase()] || null;
        }

        function cacheWord(word, data) {
            const cache = getCache();
            cache[word.toLowerCase()] = data;
            setCache(cache);
        }

        function updateCacheCount() {
            const cache = getCache();
            const count = Object.keys(cache).length;
            document.getElementById('cacheCount').textContent = count > 0 ? `(${count})` : '';
        }

        // ============ TRANSLATION API ============
        // Uses MyMemory free translation API (no key required)
        // English -> Chinese (Simplified)
        async function translateWord(word) {
            const cached = getCachedWord(word);
            if (cached) return cached;

            try {
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|zh-CN&de=stanley.tan19@gmail.com`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('API error');
                const data = await response.json();

                const mainTranslation = data.responseData?.translatedText || '';

                // Gather alternative translations from matches
                const alternatives = [];
                if (data.matches) {
                    for (const match of data.matches) {
                        const t = match.translation;
                        if (t && t !== mainTranslation && !alternatives.includes(t)) {
                            alternatives.push(t);
                            if (alternatives.length >= 3) break;
                        }
                    }
                }

                const result = {
                    translation: mainTranslation,
                    alternatives: alternatives,
                    quality: data.responseData?.match || 0
                };

                cacheWord(word, result);
                updateCacheCount();
                return result;
            } catch (err) {
                console.error(`Failed to translate "${word}":`, err);
                return { translation: '?', alternatives: [], quality: 0 };
            }
        }

        // ============ TEXT PROCESSING ============
        function tokenize(text) {
            const tokens = [];
            const lines = text.split('\n');

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                const lineTokens = [];
                const lineRegex = /([a-zA-Z''-]+)|([^\s])/g;
                let match;
                while ((match = lineRegex.exec(line)) !== null) {
                    if (match[1]) {
                        lineTokens.push({ type: 'word', text: match[1] });
                    } else if (match[2]) {
                        lineTokens.push({ type: 'punct', text: match[2] });
                    }
                }
                tokens.push(lineTokens);
            }

            return tokens;
        }

        // ============ GLOSSING ENGINE ============
        async function glossText() {
            const input = document.getElementById('inputArea').value.trim();
            if (!input) {
                setStatus('No text to gloss');
                return;
            }

            const glossArea = document.getElementById('glossArea');
            const lines = tokenize(input);

            // Collect unique words
            const uniqueWords = new Set();
            for (const line of lines) {
                for (const token of line) {
                    if (token.type === 'word') {
                        uniqueWords.add(token.text.toLowerCase());
                    }
                }
            }

            const wordArray = [...uniqueWords];
            const total = wordArray.length;
            let completed = 0;

            setStatus(`<span class="loading-spinner"></span> Glossing ${total} unique words...`);

            // Translate in batches to avoid rate limiting
            const BATCH_SIZE = 5;
            const BATCH_DELAY = 300;
            const translations = {};

            for (let i = 0; i < wordArray.length; i += BATCH_SIZE) {
                const batch = wordArray.slice(i, i + BATCH_SIZE);
                const promises = batch.map(async (word) => {
                    const result = await translateWord(word);
                    translations[word] = result;
                    completed++;
                    setStatus(`<span class="loading-spinner"></span> Glossing... ${completed}/${total}`);
                });

                await Promise.all(promises);

                if (i + BATCH_SIZE < wordArray.length) {
                    await new Promise(resolve => setTimeout(resolve, BATCH_DELAY));
                }
            }

            // Render glossed output
            glossArea.innerHTML = '';
            for (const line of lines) {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'gloss-line';

                for (const token of line) {
                    const wordDiv = document.createElement('div');

                    if (token.type === 'word') {
                        wordDiv.className = 'gloss-word';
                        const data = translations[token.text.toLowerCase()] || { translation: '?', alternatives: [] };

                        let shortTranslation = data.translation || '?';
                        if (shortTranslation.length > 8) {
                            shortTranslation = shortTranslation.substring(0, 6) + '...';
                        }

                        wordDiv.innerHTML = `
                            <span class="gloss-english">${escapeHtml(token.text)}</span>
                            <span class="gloss-chinese">${escapeHtml(shortTranslation)}</span>
                        `;

                        wordDiv.addEventListener('click', () => {
                            if (ttsPlaying) stopTTS();
                            document.querySelectorAll('.gloss-word.selected').forEach(el => el.classList.remove('selected'));
                            wordDiv.classList.add('selected');
                            showDetail(token.text, data);
                            speakWord(token.text);
                        });
                    } else {
                        wordDiv.className = 'gloss-word punctuation';
                        wordDiv.innerHTML = `<span class="gloss-english">${escapeHtml(token.text)}</span><span class="gloss-chinese">&nbsp;</span>`;
                    }

                    lineDiv.appendChild(wordDiv);
                }

                glossArea.appendChild(lineDiv);
            }

            setStatus(`Done - ${total} words glossed`);
            updateCacheCount();
            applyFontSize();
        }

        function showDetail(word, data) {
            const panel = document.getElementById('detailPanel');
            document.getElementById('detailWord').textContent = word;
            document.getElementById('detailTranslation').textContent = data.translation || 'No translation found';

            let extra = '';
            if (data.alternatives && data.alternatives.length > 0) {
                extra += 'Also: ' + data.alternatives.join(', ');
            }
            document.getElementById('detailExtra').textContent = extra;

            panel.classList.add('visible');
        }

        // ============ TEXT-TO-SPEECH ============
        let ttsPlaying = false;
        let ttsWordElements = [];
        let ttsWordIndex = 0;

        function getEnglishVoice() {
            const voices = speechSynthesis.getVoices();
            return voices.find(v => v.lang === 'en-US' && v.name.includes('Google'))
                || voices.find(v => v.lang === 'en-US' && (v.name.includes('Enhanced') || v.name.includes('Premium')))
                || voices.find(v => v.lang === 'en-US')
                || voices.find(v => v.lang.startsWith('en'))
                || null;
        }

        function speakWord(word) {
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US';
            utterance.rate = 0.85;
            const voice = getEnglishVoice();
            if (voice) utterance.voice = voice;
            speechSynthesis.speak(utterance);
        }

        function stopTTS() {
            speechSynthesis.cancel();
            ttsPlaying = false;
            ttsWordIndex = 0;
            document.querySelectorAll('.gloss-word.speaking').forEach(el => el.classList.remove('speaking'));
            setStatus('Stopped');
        }

        function playAllWords() {
            ttsWordElements = [...document.querySelectorAll('.gloss-word:not(.punctuation)')];
            if (ttsWordElements.length === 0) {
                setStatus('Nothing to play - gloss some text first');
                return;
            }

            stopTTS();
            ttsPlaying = true;
            ttsWordIndex = 0;
            speakNextWord();
        }

        function speakNextWord() {
            if (!ttsPlaying || ttsWordIndex >= ttsWordElements.length) {
                ttsPlaying = false;
                document.querySelectorAll('.gloss-word.speaking').forEach(el => el.classList.remove('speaking'));
                if (ttsWordIndex >= ttsWordElements.length) setStatus('Finished reading');
                return;
            }

            document.querySelectorAll('.gloss-word.speaking').forEach(el => el.classList.remove('speaking'));

            const el = ttsWordElements[ttsWordIndex];
            const englishText = el.querySelector('.gloss-english')?.textContent || '';
            if (!englishText) {
                ttsWordIndex++;
                speakNextWord();
                return;
            }

            el.classList.add('speaking');
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            setStatus(`Playing ${ttsWordIndex + 1}/${ttsWordElements.length}: ${englishText}`);

            const utterance = new SpeechSynthesisUtterance(englishText);
            utterance.lang = 'en-US';
            utterance.rate = 0.85;
            const voice = getEnglishVoice();
            if (voice) utterance.voice = voice;

            utterance.onend = () => {
                ttsWordIndex++;
                if (ttsPlaying) {
                    setTimeout(() => speakNextWord(), 150);
                }
            };

            utterance.onerror = () => {
                ttsWordIndex++;
                if (ttsPlaying) speakNextWord();
            };

            speechSynthesis.cancel();
            setTimeout(() => {
                if (ttsPlaying) speechSynthesis.speak(utterance);
            }, 50);
        }

        // ============ FONT SIZE ============
        const FONT_KEY = 'english_glosser_fontsize';
        let glossFontSize = parseInt(localStorage.getItem(FONT_KEY)) || 20;

        function applyFontSize() {
            document.querySelectorAll('.gloss-english').forEach(el => {
                el.style.fontSize = glossFontSize + 'px';
            });
            document.querySelectorAll('.gloss-chinese').forEach(el => {
                el.style.fontSize = Math.max(12, glossFontSize * 0.65) + 'px';
            });
        }

        function changeFontSize(delta) {
            glossFontSize += delta;
            if (glossFontSize < 10) glossFontSize = 10;
            if (glossFontSize > 48) glossFontSize = 48;
            localStorage.setItem(FONT_KEY, glossFontSize);
            applyFontSize();

            const btn = delta > 0 ? document.getElementById('fontIncrease') : document.getElementById('fontDecrease');
            btn.style.background = '#10B981';
            setTimeout(() => { btn.style.background = '#e0e0e0'; }, 200);
        }

        // ============ UTILITIES ============
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setStatus(msg) {
            document.getElementById('status').innerHTML = msg;
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('inputArea').value = text;
                setStatus('Text pasted - click Gloss to translate');
            } catch (err) {
                setStatus('Failed to read clipboard - try Ctrl+V into the text area');
            }
        }

        // ============ EVENT LISTENERS ============
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('pasteBtn').addEventListener('click', async () => {
                await pasteFromClipboard();
                await glossText();
            });

            document.getElementById('glossBtn').addEventListener('click', glossText);

            document.getElementById('clearBtn').addEventListener('click', () => {
                document.getElementById('inputArea').value = '';
                document.getElementById('glossArea').innerHTML = '<div class="placeholder">Glossed text will appear here</div>';
                document.getElementById('detailPanel').classList.remove('visible');
                setStatus('Cleared');
            });

            document.getElementById('playAllBtn').addEventListener('click', playAllWords);
            document.getElementById('stopBtn').addEventListener('click', stopTTS);

            document.getElementById('fontIncrease').addEventListener('click', () => changeFontSize(2));
            document.getElementById('fontDecrease').addEventListener('click', () => changeFontSize(-2));

            speechSynthesis.addEventListener('voiceschanged', () => speechSynthesis.getVoices());

            document.getElementById('clearCacheBtn').addEventListener('click', () => {
                const cache = getCache();
                const count = Object.keys(cache).length;
                localStorage.removeItem(CACHE_KEY);
                updateCacheCount();
                setStatus(`Cache cleared (${count} words removed)`);
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    e.preventDefault();
                    pasteFromClipboard().then(() => glossText());
                }
            });

            updateCacheCount();
        });
    </script>
</body>
</html>
