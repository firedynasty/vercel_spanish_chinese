<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Lyrics Glosser</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #1a1a2e;
            color: #e0e0e0;
            padding: 1rem;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #ffd43b;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .button-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        button {
            padding: 0.6rem 1.2rem;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover { transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        .btn-paste { background-color: #3B82F6; }
        .btn-paste:hover { background-color: #2563EB; }
        .btn-clear { background-color: #6B7280; }
        .btn-clear:hover { background-color: #4B5563; }
        .btn-gloss { background-color: #10B981; }
        .btn-gloss:hover { background-color: #059669; }
        .btn-paste2nd { background-color: #8B5CF6; }
        .btn-paste2nd:hover { background-color: #7C3AED; }
        .btn-play { background-color: #EF4444; }
        .btn-play:hover { background-color: #DC2626; }
        .btn-stop { background-color: #6B7280; }
        .btn-stop:hover { background-color: #4B5563; }
        .btn-cache { background-color: #F59E0B; color: #1a1a2e; }
        .btn-cache:hover { background-color: #D97706; }

        .reference-area {
            width: 100%;
            min-height: 80px;
            background: #1e1e3a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            color: #e0e0e0;
            font-size: 1rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .reference-area .placeholder {
            color: #666;
            font-style: italic;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 1rem;
            border: 2px solid #333;
            border-radius: 8px;
            background: #16213e;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            margin-bottom: 1rem;
            outline: none;
        }

        textarea:focus { border-color: #3B82F6; }

        .status {
            text-align: center;
            padding: 0.5rem;
            background: #16213e;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: #9ca3af;
            min-height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gloss-area {
            background: #16213e;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 1.5rem;
            min-height: 200px;
            line-height: 1.6;
        }

        .lyric-block {
            margin-bottom: 1.5rem;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid #2a2a4a;
        }

        .lyric-block:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .lyric-english {
            color: #93C5FD;
            margin-bottom: 0.5rem;
            font-style: italic;
        }

        .lyric-words-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin-bottom: 0.3rem;
        }

        .gloss-word {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            padding: 0.3rem 0.5rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            min-width: 40px;
        }

        .gloss-word:hover {
            background-color: #2a2a4a;
        }

        .gloss-word.selected {
            background-color: #3B82F6;
        }

        .gloss-word.speaking {
            background-color: #EF4444;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
        }

        .gloss-korean {
            font-size: 1.3rem;
            font-weight: 600;
            color: #ffd43b;
            margin-bottom: 0.2rem;
        }

        .gloss-english {
            font-size: 0.7rem;
            color: #9ca3af;
            text-align: center;
            max-width: 120px;
            word-wrap: break-word;
        }

        .gloss-word.punctuation {
            min-width: auto;
            padding: 0.3rem 0.1rem;
            cursor: default;
        }

        .gloss-word.punctuation:hover {
            background-color: transparent;
        }

        .gloss-word.punctuation .gloss-korean {
            color: #6B7280;
        }

        .lyric-roman {
            color: #9ca3af;
            font-size: 0.85em;
            margin-top: 0.2rem;
        }

        .detail-panel {
            margin-top: 1rem;
            padding: 1rem;
            background: #0f3460;
            border-radius: 8px;
            display: none;
            border: 1px solid #3B82F6;
        }

        .detail-panel.visible { display: block; }

        .detail-word {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffd43b;
            margin-bottom: 0.5rem;
        }

        .detail-translation {
            font-size: 1.1rem;
            color: #93C5FD;
            margin-bottom: 0.5rem;
        }

        .detail-extra {
            font-size: 0.9rem;
            color: #9ca3af;
            line-height: 1.6;
        }

        .placeholder {
            text-align: center;
            color: #4B5563;
            padding: 3rem 1rem;
            font-size: 1.1rem;
        }

        .cache-count {
            font-size: 0.75rem;
            color: #6B7280;
            margin-left: 0.5rem;
        }

        .font-size-btn {
            width: 32px;
            height: 32px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #e0e0e0;
            color: #333;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .font-size-btn:hover {
            background: #3B82F6;
            color: white;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #4B5563;
            border-top: 2px solid #3B82F6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            body { padding: 0.5rem; }
            h1 { font-size: 1.2rem; }
            .button-group { gap: 0.3rem; }
            button { padding: 0.5rem 0.8rem; font-size: 0.8rem; }
            .gloss-area { padding: 1rem; }
            .gloss-korean { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Korean Lyrics Glosser</h1>

        <div class="button-group">
            <button class="btn-paste" id="pasteBtn">Paste (Esc)</button>
            <button class="btn-gloss" id="glossBtn">Gloss</button>
            <button class="btn-gloss" id="noGlossBtn" style="background:#6b7280;">No Gloss</button>
            <button class="btn-gloss" id="copyLinesBtn" style="background:#059669;">Copy Lines</button>
            <button class="btn-clear" id="clearBtn">Clear</button>
            <button class="btn-play" id="playAllBtn">Play All</button>
            <button class="btn-stop" id="stopBtn">Stop</button>
            <button class="btn-cache" id="clearCacheBtn">Clear Cache <span class="cache-count" id="cacheCount"></span></button>
            <button style="background-color:#EF4444;font-size:0.8rem;" onclick="location.href='/spanish-glosser'">Spanish</button>
            <button style="background-color:#14B8A6;font-size:0.8rem;" onclick="location.href='/chinese-glosser'">Chinese</button>
            <button style="background-color:#3B82F6;font-size:0.8rem;" onclick="location.href='/english-glosser'">English</button>
            <button style="background-color:#8B5CF6;font-size:0.8rem;" onclick="location.href='/reverse-english'">Reverse English</button>
            <button style="background-color:#F97316;font-size:0.8rem;" onclick="location.href='/french-glosser'">French</button>
            <button class="font-size-btn" id="fontDecrease" title="Decrease font size">-</button>
            <button class="font-size-btn" id="fontIncrease" title="Increase font size">+</button>
            <button class="btn-paste2nd" id="paste2ndBtn">Paste 2nd</button>
        </div>

        <textarea id="inputArea" placeholder="Paste Korean lyrics here...&#10;&#10;Format: groups of 3 lines separated by blank lines:&#10;English translation&#10;한국어 (Korean)&#10;romanization"></textarea>

        <div class="status" id="status">Ready - paste lyrics and click Gloss</div>

        <div class="gloss-area" id="glossArea">
            <div class="placeholder">Glossed lyrics will appear here</div>
        </div>

        <div class="detail-panel" id="detailPanel">
            <div class="detail-word" id="detailWord"></div>
            <div class="detail-translation" id="detailTranslation"></div>
            <div class="detail-extra" id="detailExtra"></div>
        </div>

        <div class="reference-area" id="referenceArea">
            <div class="placeholder">Paste 2nd content will appear here</div>
        </div>
    </div>

    <script>
        // ============ DICTIONARY CACHE ============
        const CACHE_KEY = 'korean_glosser_cache';

        function getCache() {
            try {
                return JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
            } catch { return {}; }
        }

        function setCache(cache) {
            localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
        }

        function getCachedWord(word) {
            const cache = getCache();
            return cache[word] || null;
        }

        function cacheWord(word, data) {
            const cache = getCache();
            cache[word] = data;
            setCache(cache);
        }

        function updateCacheCount() {
            const cache = getCache();
            const count = Object.keys(cache).length;
            document.getElementById('cacheCount').textContent = count > 0 ? `(${count})` : '';
        }

        // ============ TRANSLATION API ============
        async function translateWord(word) {
            const cached = getCachedWord(word);
            if (cached) return cached;

            try {
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=ko|en&de=stanley.tan19@gmail.com`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('API error');
                const data = await response.json();

                const mainTranslation = data.responseData?.translatedText || '';

                const alternatives = [];
                if (data.matches) {
                    for (const match of data.matches) {
                        const t = match.translation;
                        if (t && t.toLowerCase() !== mainTranslation.toLowerCase() && !alternatives.includes(t)) {
                            alternatives.push(t);
                            if (alternatives.length >= 3) break;
                        }
                    }
                }

                const result = {
                    translation: mainTranslation,
                    alternatives: alternatives,
                    quality: data.responseData?.match || 0
                };

                cacheWord(word, result);
                updateCacheCount();
                return result;
            } catch (err) {
                console.error(`Failed to translate "${word}":`, err);
                return { translation: '?', alternatives: [], quality: 0 };
            }
        }

        // ============ LINE DETECTION ============
        function containsKorean(text) {
            return /[\uAC00-\uD7AF\u1100-\u11FF\u3130-\u318F\uA960-\uA97F\uD7B0-\uD7FF]/.test(text);
        }

        function isRomanization(text) {
            if (containsKorean(text)) return false;
            return /^[a-zA-Z\s\-'.,!?;:()0-9]+$/.test(text.trim()) && /[a-z]/.test(text);
        }

        // ============ LYRICS PARSER ============
        function parseLyrics(text) {
            const lines = text.split('\n');
            const blocks = [];
            let current = [];

            for (const line of lines) {
                const trimmed = line.trim();
                if (trimmed === '') {
                    if (current.length > 0) {
                        blocks.push(current);
                        current = [];
                    }
                } else {
                    current.push(trimmed);
                }
            }
            if (current.length > 0) blocks.push(current);

            const result = [];
            for (const block of blocks) {
                const entry = { english: '', korean: '', roman: '' };

                for (const line of block) {
                    if (containsKorean(line)) {
                        entry.korean = line;
                    } else if (entry.korean && isRomanization(line)) {
                        entry.roman = line;
                    } else {
                        if (!entry.english) {
                            entry.english = line;
                        } else {
                            entry.english += ' ' + line;
                        }
                    }
                }

                if (entry.korean || entry.english) {
                    result.push(entry);
                }
            }

            return result;
        }

        // ============ TOKENIZE KOREAN LINE ============
        function tokenizeKorean(text) {
            const tokens = [];
            // Split on whitespace, keeping punctuation as separate tokens
            const regex = /([\uAC00-\uD7AF\u1100-\u11FF\u3130-\u318F\uA960-\uA97F\uD7B0-\uD7FFa-zA-Z]+)|([^\s])/g;
            let match;
            while ((match = regex.exec(text)) !== null) {
                if (match[1]) {
                    tokens.push({ type: 'word', text: match[1] });
                } else if (match[2]) {
                    tokens.push({ type: 'punct', text: match[2] });
                }
            }
            return tokens;
        }

        // ============ GLOSSING ENGINE ============
        async function glossLyrics() {
            const input = document.getElementById('inputArea').value.trim();
            if (!input) {
                setStatus('No text to gloss');
                return;
            }

            const glossArea = document.getElementById('glossArea');
            const blocks = parseLyrics(input);

            if (blocks.length === 0) {
                setStatus('Could not parse any lyric blocks');
                return;
            }

            // Collect all unique Korean words for translation
            const uniqueWords = new Set();
            for (const block of blocks) {
                if (block.korean) {
                    const tokens = tokenizeKorean(block.korean);
                    for (const t of tokens) {
                        if (t.type === 'word' && containsKorean(t.text)) {
                            uniqueWords.add(t.text);
                        }
                    }
                }
            }

            const wordArray = [...uniqueWords];
            const total = wordArray.length;
            let completed = 0;

            setStatus(`<span class="loading-spinner"></span> Translating ${total} unique words...`);

            // Translate in batches
            const BATCH_SIZE = 5;
            const BATCH_DELAY = 300;
            const translations = {};

            for (let i = 0; i < wordArray.length; i += BATCH_SIZE) {
                const batch = wordArray.slice(i, i + BATCH_SIZE);
                const promises = batch.map(async (word) => {
                    const result = await translateWord(word);
                    translations[word] = result;
                    completed++;
                    setStatus(`<span class="loading-spinner"></span> Translating... ${completed}/${total}`);
                });

                await Promise.all(promises);

                if (i + BATCH_SIZE < wordArray.length) {
                    await new Promise(resolve => setTimeout(resolve, BATCH_DELAY));
                }
            }

            // Render
            glossArea.innerHTML = '';

            for (const block of blocks) {
                const blockDiv = document.createElement('div');
                blockDiv.className = 'lyric-block';

                // English line
                if (block.english) {
                    const engDiv = document.createElement('div');
                    engDiv.className = 'lyric-english';
                    engDiv.textContent = block.english;
                    blockDiv.appendChild(engDiv);
                }

                // Korean words row with translations
                if (block.korean) {
                    const wordsRow = document.createElement('div');
                    wordsRow.className = 'lyric-words-row';

                    const tokens = tokenizeKorean(block.korean);
                    for (const token of tokens) {
                        const wordDiv = document.createElement('div');

                        if (token.type === 'word' && containsKorean(token.text)) {
                            wordDiv.className = 'gloss-word';
                            const data = translations[token.text] || { translation: '?', alternatives: [] };

                            let shortTranslation = data.translation || '?';
                            if (shortTranslation.length > 15) {
                                shortTranslation = shortTranslation.substring(0, 13) + '...';
                            }

                            wordDiv.innerHTML = `
                                <span class="gloss-korean">${escapeHtml(token.text)}</span>
                                <span class="gloss-english">${escapeHtml(shortTranslation.toLowerCase())}</span>
                            `;

                            wordDiv.addEventListener('click', () => {
                                if (ttsPlaying) stopTTS();
                                document.querySelectorAll('.gloss-word.selected').forEach(el => el.classList.remove('selected'));
                                wordDiv.classList.add('selected');
                                showDetail(token.text, data);
                                speakWord(token.text);
                            });
                        } else if (token.type === 'word') {
                            // Non-Korean word (rare in lyrics)
                            wordDiv.className = 'gloss-word';
                            wordDiv.innerHTML = `
                                <span class="gloss-korean">${escapeHtml(token.text)}</span>
                                <span class="gloss-english">&nbsp;</span>
                            `;
                        } else {
                            wordDiv.className = 'gloss-word punctuation';
                            wordDiv.innerHTML = `<span class="gloss-korean">${escapeHtml(token.text)}</span><span class="gloss-english">&nbsp;</span>`;
                        }

                        wordsRow.appendChild(wordDiv);
                    }

                    blockDiv.appendChild(wordsRow);
                }

                // Romanization line
                if (block.roman) {
                    const romDiv = document.createElement('div');
                    romDiv.className = 'lyric-roman';
                    romDiv.textContent = block.roman;
                    blockDiv.appendChild(romDiv);
                }

                glossArea.appendChild(blockDiv);
            }

            setStatus(`Done - ${total} words translated across ${blocks.length} lines`);
            updateCacheCount();
            applyFontSize();
        }

        function noGlossLyrics() {
            const input = document.getElementById('inputArea').value.trim();
            if (!input) {
                setStatus('No text to format');
                return;
            }

            const glossArea = document.getElementById('glossArea');
            const blocks = parseLyrics(input);

            if (blocks.length === 0) {
                setStatus('Could not parse any lyric blocks');
                return;
            }

            glossArea.innerHTML = '';

            for (const block of blocks) {
                const blockDiv = document.createElement('div');
                blockDiv.className = 'lyric-block';

                if (block.english) {
                    const engDiv = document.createElement('div');
                    engDiv.className = 'lyric-english';
                    engDiv.textContent = block.english;
                    blockDiv.appendChild(engDiv);
                }

                if (block.korean) {
                    const wordsRow = document.createElement('div');
                    wordsRow.className = 'lyric-words-row';

                    const tokens = tokenizeKorean(block.korean);
                    for (const token of tokens) {
                        const wordDiv = document.createElement('div');

                        if (token.type === 'word' && containsKorean(token.text)) {
                            wordDiv.className = 'gloss-word';
                            wordDiv.innerHTML = `
                                <span class="gloss-korean">${escapeHtml(token.text)}</span>
                                <span class="gloss-english">&nbsp;</span>
                            `;

                            wordDiv.addEventListener('click', () => {
                                if (ttsPlaying) stopTTS();
                                document.querySelectorAll('.gloss-word.selected').forEach(el => el.classList.remove('selected'));
                                wordDiv.classList.add('selected');
                                speakWord(token.text);
                            });
                        } else if (token.type === 'word') {
                            wordDiv.className = 'gloss-word';
                            wordDiv.innerHTML = `
                                <span class="gloss-korean">${escapeHtml(token.text)}</span>
                                <span class="gloss-english">&nbsp;</span>
                            `;
                        } else {
                            wordDiv.className = 'gloss-word punctuation';
                            wordDiv.innerHTML = `<span class="gloss-korean">${escapeHtml(token.text)}</span><span class="gloss-english">&nbsp;</span>`;
                        }

                        wordsRow.appendChild(wordDiv);
                    }

                    blockDiv.appendChild(wordsRow);
                }

                if (block.roman) {
                    const romDiv = document.createElement('div');
                    romDiv.className = 'lyric-roman';
                    romDiv.textContent = block.roman;
                    blockDiv.appendChild(romDiv);
                }

                glossArea.appendChild(blockDiv);
            }

            setStatus(`Formatted (no gloss) - ${blocks.length} lines`);
            applyFontSize();
        }

        function showDetail(word, data) {
            const panel = document.getElementById('detailPanel');
            document.getElementById('detailWord').textContent = word;
            document.getElementById('detailTranslation').textContent = data.translation || 'No translation found';

            let extra = '';
            if (data.alternatives && data.alternatives.length > 0) {
                extra += 'Also: ' + data.alternatives.join(', ');
            }
            document.getElementById('detailExtra').textContent = extra;

            panel.classList.add('visible');
        }

        // ============ TEXT-TO-SPEECH ============
        let ttsPlaying = false;
        let ttsWordElements = [];
        let ttsWordIndex = 0;

        function getKoreanVoice() {
            const voices = speechSynthesis.getVoices();
            return voices.find(v => v.lang === 'ko-KR' && v.name.includes('Google'))
                || voices.find(v => v.lang === 'ko-KR' && (v.name.includes('Enhanced') || v.name.includes('Premium')))
                || voices.find(v => v.lang === 'ko-KR')
                || voices.find(v => v.lang.startsWith('ko'))
                || null;
        }

        function speakWord(word) {
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'ko-KR';
            utterance.rate = 0.85;
            const voice = getKoreanVoice();
            if (voice) utterance.voice = voice;
            speechSynthesis.speak(utterance);
        }

        function stopTTS() {
            speechSynthesis.cancel();
            ttsPlaying = false;
            ttsWordIndex = 0;
            document.querySelectorAll('.gloss-word.speaking').forEach(el => el.classList.remove('speaking'));
            setStatus('Stopped');
        }

        function playAllWords() {
            ttsWordElements = [...document.querySelectorAll('.gloss-word:not(.punctuation)')];
            if (ttsWordElements.length === 0) {
                setStatus('Nothing to play - gloss some lyrics first');
                return;
            }

            stopTTS();
            ttsPlaying = true;
            ttsWordIndex = 0;
            speakNextWord();
        }

        function speakNextWord() {
            if (!ttsPlaying || ttsWordIndex >= ttsWordElements.length) {
                ttsPlaying = false;
                document.querySelectorAll('.gloss-word.speaking').forEach(el => el.classList.remove('speaking'));
                if (ttsWordIndex >= ttsWordElements.length) setStatus('Finished reading');
                return;
            }

            document.querySelectorAll('.gloss-word.speaking').forEach(el => el.classList.remove('speaking'));

            const el = ttsWordElements[ttsWordIndex];
            const koreanText = el.querySelector('.gloss-korean')?.textContent || '';
            if (!koreanText) {
                ttsWordIndex++;
                speakNextWord();
                return;
            }

            el.classList.add('speaking');
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            setStatus(`Playing ${ttsWordIndex + 1}/${ttsWordElements.length}: ${koreanText}`);

            const utterance = new SpeechSynthesisUtterance(koreanText);
            utterance.lang = 'ko-KR';
            utterance.rate = 0.85;
            const voice = getKoreanVoice();
            if (voice) utterance.voice = voice;

            utterance.onend = () => {
                ttsWordIndex++;
                if (ttsPlaying) {
                    setTimeout(() => speakNextWord(), 150);
                }
            };

            utterance.onerror = () => {
                ttsWordIndex++;
                if (ttsPlaying) speakNextWord();
            };

            speechSynthesis.cancel();
            setTimeout(() => {
                if (ttsPlaying) speechSynthesis.speak(utterance);
            }, 50);
        }

        // ============ PASTE 2ND ============
        async function paste2nd() {
            try {
                const text = await navigator.clipboard.readText();
                const refArea = document.getElementById('referenceArea');
                refArea.textContent = text;
                setStatus('Reference text pasted');
            } catch {
                setStatus('Failed to read clipboard');
            }
        }

        // ============ FONT SIZE ============
        const FONT_KEY = 'korean_glosser_fontsize';
        let glossFontSize = parseInt(localStorage.getItem(FONT_KEY)) || 22;

        function applyFontSize() {
            document.querySelectorAll('.gloss-korean').forEach(el => {
                el.style.fontSize = glossFontSize + 'px';
            });
            document.querySelectorAll('.gloss-english').forEach(el => {
                el.style.fontSize = Math.max(10, glossFontSize * 0.55) + 'px';
            });
            document.querySelectorAll('.lyric-english').forEach(el => {
                el.style.fontSize = Math.max(12, glossFontSize * 0.7) + 'px';
            });
            document.querySelectorAll('.lyric-roman').forEach(el => {
                el.style.fontSize = Math.max(11, glossFontSize * 0.6) + 'px';
            });
        }

        function changeFontSize(delta) {
            glossFontSize += delta;
            if (glossFontSize < 10) glossFontSize = 10;
            if (glossFontSize > 48) glossFontSize = 48;
            localStorage.setItem(FONT_KEY, glossFontSize);
            applyFontSize();

            const btn = delta > 0 ? document.getElementById('fontIncrease') : document.getElementById('fontDecrease');
            btn.style.background = '#10B981';
            setTimeout(() => { btn.style.background = '#e0e0e0'; }, 200);
        }

        // ============ UTILITIES ============
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setStatus(msg) {
            document.getElementById('status').innerHTML = msg;
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('inputArea').value = text;
                setStatus('Text pasted - click Gloss to translate');
            } catch (err) {
                setStatus('Failed to read clipboard - try Ctrl+V into the text area');
            }
        }

        // ============ EVENT LISTENERS ============
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('pasteBtn').addEventListener('click', async () => {
                await pasteFromClipboard();
                await glossLyrics();
            });

            document.getElementById('glossBtn').addEventListener('click', glossLyrics);
            document.getElementById('noGlossBtn').addEventListener('click', noGlossLyrics);
            document.getElementById('copyLinesBtn').addEventListener('click', async () => {
                const words = document.querySelectorAll('#glossArea .gloss-word:not(.punctuation) .gloss-korean');
                if (words.length === 0) { setStatus('Nothing to copy'); return; }
                const text = [...words].map(el => el.textContent.trim()).join('\n');
                await navigator.clipboard.writeText(text);
                setStatus(`Copied ${words.length} words to clipboard`);
            });
            document.getElementById('paste2ndBtn').addEventListener('click', paste2nd);

            document.getElementById('clearBtn').addEventListener('click', () => {
                document.getElementById('inputArea').value = '';
                document.getElementById('glossArea').innerHTML = '<div class="placeholder">Glossed lyrics will appear here</div>';
                document.getElementById('detailPanel').classList.remove('visible');
                document.getElementById('referenceArea').innerHTML = '<div class="placeholder">Paste 2nd content will appear here</div>';
                setStatus('Cleared');
            });

            document.getElementById('playAllBtn').addEventListener('click', playAllWords);
            document.getElementById('stopBtn').addEventListener('click', stopTTS);

            document.getElementById('fontIncrease').addEventListener('click', () => changeFontSize(2));
            document.getElementById('fontDecrease').addEventListener('click', () => changeFontSize(-2));

            speechSynthesis.addEventListener('voiceschanged', () => speechSynthesis.getVoices());

            document.getElementById('clearCacheBtn').addEventListener('click', () => {
                const cache = getCache();
                const count = Object.keys(cache).length;
                localStorage.removeItem(CACHE_KEY);
                updateCacheCount();
                setStatus(`Cache cleared (${count} words removed)`);
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    e.preventDefault();
                    pasteFromClipboard().then(() => glossLyrics());
                }
            });

            updateCacheCount();
        });
    </script>
</body>
</html>
